<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Wishlist & Cart - MuscleCart</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .login-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }
        .login-section h2 {
            color: #667eea;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h2 .icon {
            font-size: 1.5em;
        }
        .status {
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .status.loading {
            background: #ffd93d;
            color: #333;
        }
        .status.success {
            background: #6BCF7F;
            color: white;
        }
        .status.error {
            background: #FF6B6B;
            color: white;
        }
        .status.not-logged-in {
            background: #95a5a6;
            color: white;
        }
        .item {
            padding: 15px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .item:hover {
            border-color: #667eea;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        .item h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.1em;
        }
        .item p {
            color: #666;
            margin: 5px 0;
        }
        .item .price {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 10px;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
            font-style: italic;
        }
        .total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: right;
            font-size: 1.3em;
            font-weight: bold;
        }
        .badge {
            background: #667eea;
            color: white;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 0.9em;
            margin-left: 10px;
        }
        .refresh-btn {
            float: right;
            padding: 8px 20px;
            font-size: 14px;
        }
        pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 MuscleCart - Wishlist & Cart Viewer</h1>
        
        <div class="login-section">
            <h2>🔐 Login untuk Melihat Data</h2>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" value="test@test.com" placeholder="Masukkan email">
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" value="password123" placeholder="Masukkan password">
            </div>
            <button onclick="login()" id="loginBtn">Login & Load Data</button>
            <span id="loginStatus"></span>
        </div>

        <div class="grid">
            <!-- Wishlist/Favorites Card -->
            <div class="card">
                <h2>
                    <span class="icon">❤️</span>
                    Wishlist (Favorites)
                    <span class="badge" id="wishlistCount">0</span>
                    <button class="refresh-btn" onclick="loadFavorites()" id="refreshWishlist" disabled>Refresh</button>
                </h2>
                <div id="wishlistStatus" class="status not-logged-in">Silakan login terlebih dahulu</div>
                <div id="wishlistContent">
                    <div class="empty">Login untuk melihat wishlist</div>
                </div>
            </div>

            <!-- Cart Card -->
            <div class="card">
                <h2>
                    <span class="icon">🛒</span>
                    Shopping Cart
                    <span class="badge" id="cartCount">0</span>
                    <button class="refresh-btn" onclick="loadCart()" id="refreshCart" disabled>Refresh</button>
                </h2>
                <div id="cartStatus" class="status not-logged-in">Silakan login terlebih dahulu</div>
                <div id="cartContent">
                    <div class="empty">Login untuk melihat cart</div>
                </div>
                <div id="cartTotal"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let authToken = null;

        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const loginStatus = document.getElementById('loginStatus');

            if (!email || !password) {
                alert('Masukkan email dan password!');
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';
            loginStatus.innerHTML = '<span class="status loading">⏳ Logging in...</span>';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok && data.token) {
                    authToken = data.token;
                    loginStatus.innerHTML = '<span class="status success">✅ Login berhasil!</span>';
                    loginBtn.textContent = 'Logged In';
                    
                    document.getElementById('refreshWishlist').disabled = false;
                    document.getElementById('refreshCart').disabled = false;

                    // Auto load data
                    await Promise.all([loadFavorites(), loadCart()]);
                } else {
                    throw new Error(data.message || 'Login gagal');
                }
            } catch (error) {
                loginStatus.innerHTML = `<span class="status error">❌ ${error.message}</span>`;
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login & Load Data';
            }
        }

        async function loadFavorites() {
            if (!authToken) {
                alert('Silakan login terlebih dahulu!');
                return;
            }

            const status = document.getElementById('wishlistStatus');
            const content = document.getElementById('wishlistContent');
            const count = document.getElementById('wishlistCount');

            status.className = 'status loading';
            status.textContent = '⏳ Loading wishlist...';

            try {
                const response = await fetch(`${API_URL}/favorites`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = `✅ ${data.data.length} items in wishlist`;
                    count.textContent = data.data.length;

                    if (data.data.length === 0) {
                        content.innerHTML = '<div class="empty">Wishlist kosong</div>';
                    } else {
                        content.innerHTML = data.data.map(item => `
                            <div class="item">
                                <h3>${item.product.name}</h3>
                                <p><strong>Category:</strong> ${item.product.category.name}</p>
                                <p><strong>Stock:</strong> ${item.product.stock_quantity} units</p>
                                <p class="price">Rp ${parseInt(item.product.price).toLocaleString('id-ID')}</p>
                            </div>
                        `).join('');
                    }
                } else {
                    throw new Error(data.message || 'Gagal load wishlist');
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = `❌ Error: ${error.message}`;
                content.innerHTML = `<div class="empty">Error: ${error.message}</div>`;
            }
        }

        async function loadCart() {
            if (!authToken) {
                alert('Silakan login terlebih dahulu!');
                return;
            }

            const status = document.getElementById('cartStatus');
            const content = document.getElementById('cartContent');
            const count = document.getElementById('cartCount');
            const totalDiv = document.getElementById('cartTotal');

            status.className = 'status loading';
            status.textContent = '⏳ Loading cart...';

            try {
                const response = await fetch(`${API_URL}/cart`, {
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = `✅ ${data.data.length} items in cart`;
                    count.textContent = data.data.length;

                    if (data.data.length === 0) {
                        content.innerHTML = '<div class="empty">Cart kosong</div>';
                        totalDiv.innerHTML = '';
                    } else {
                        let total = 0;
                        content.innerHTML = data.data.map(item => {
                            const subtotal = parseInt(item.price) * parseInt(item.quantity);
                            total += subtotal;
                            return `
                                <div class="item">
                                    <h3>${item.product.name}</h3>
                                    <p><strong>Quantity:</strong> ${item.quantity}</p>
                                    <p><strong>Price per item:</strong> Rp ${parseInt(item.price).toLocaleString('id-ID')}</p>
                                    <p class="price">Subtotal: Rp ${subtotal.toLocaleString('id-ID')}</p>
                                </div>
                            `;
                        }).join('');

                        totalDiv.innerHTML = `<div class="total">TOTAL: Rp ${total.toLocaleString('id-ID')}</div>`;
                    }
                } else {
                    throw new Error(data.message || 'Gagal load cart');
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = `❌ Error: ${error.message}`;
                content.innerHTML = `<div class="empty">Error: ${error.message}</div>`;
            }
        }

        // Auto login on page load for demo
        window.addEventListener('load', () => {
            console.log('Page loaded. Ready to test!');
        });
    </script>
</body>
</html>
